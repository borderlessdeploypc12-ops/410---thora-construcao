services:
  - type: web
    name: four10-thora-construcao
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 1 --timeout 600 --graceful-timeout 30 -b 0.0.0.0:$PORT -k uvicorn.workers.UvicornWorker main:app
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DETECT_TABLES_MAX_PAGES
        value: "10"
      - key: DISABLE_CAMELOT
        value: "true"
      - key: USE_CELERY_QUEUE
        value: "false"
      - key: FRONTEND_URL
        value: https://borderless-410-thora.netlify.app
      - key: FRONTEND_URLS
        value: https://borderless-410-thora.netlify.app,https://borderles-410.netlify.app,https://410-thora.netlify.app
      - key: RENDER
        value: "true"
      - key: OPENAI_ORCAMENTO_MODEL
        value: gpt-4o
      - key: OPENAI_ORCAMENTO_TIMEOUT
        value: "120"
      # OPENAI_API_KEY e GEMINI_API_KEY: defina SOMENTE no painel Render → Environment
      # (não use sync:false no blueprint — pode impedir a injeção da chave no runtime)
      # FIREBASE_CREDENTIALS (JSON da service account) — também via Environment / Secret File
